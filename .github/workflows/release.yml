name: Build and Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Get version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          # Strip 'v' prefix for build version
          BUILD_VERSION=${VERSION#v}
          echo "build_version=$BUILD_VERSION" >> $GITHUB_OUTPUT

      - name: Run tests
        run: make test

      - name: Build all platforms
        run: make build-all VERSION=${{ steps.version.outputs.build_version }}

      - name: Create zip archives
        run: |
          cd bin
          for platform in darwin-amd64 darwin-arm64 linux-amd64 linux-arm64 windows-amd64; do
            cd $platform
            if [ "$platform" = "windows-amd64" ]; then
              zip ../infra-${platform}.zip infra.exe
            else
              zip ../infra-${platform}.zip infra
            fi
            cd ..
          done

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: |
            bin/infra-darwin-amd64.zip
            bin/infra-darwin-arm64.zip
            bin/infra-linux-amd64.zip
            bin/infra-linux-arm64.zip
            bin/infra-windows-amd64.zip
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
